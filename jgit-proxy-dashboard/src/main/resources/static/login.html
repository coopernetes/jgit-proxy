<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>git-proxy · sign in</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gray-100 min-h-screen flex flex-col">
    <header class="bg-slate-800 text-white px-6 py-4 shadow">
      <img src="/logo.png" alt="jgit-proxy" class="h-10 w-auto" />
    </header>

    <main class="flex-1 flex items-center justify-center px-4 py-12">
      <div class="bg-white rounded-lg shadow border border-gray-200 w-full max-w-sm px-8 py-8">
        <h2 class="text-lg font-semibold text-gray-800 mb-6">Sign in</h2>

        <div id="msg-logout" class="hidden mb-4 text-sm text-green-700 bg-green-50 border border-green-200 rounded px-3 py-2">
          You have been signed out.
        </div>
        <div id="msg-error" class="hidden mb-4 text-sm text-red-700 bg-red-50 border border-red-200 rounded px-3 py-2">
          Invalid username or password.
        </div>

        <form method="post" action="/login" class="space-y-4">
          <div>
            <label for="username" class="block text-sm font-medium text-gray-700 mb-1">Username</label>
            <input
              id="username"
              name="username"
              type="text"
              autocomplete="username"
              required
              autofocus
              class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-300"
            />
          </div>
          <div>
            <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
            <input
              id="password"
              name="password"
              type="password"
              autocomplete="current-password"
              required
              class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-300"
            />
          </div>
          <button
            type="submit"
            class="w-full px-4 py-2 text-sm font-medium rounded bg-slate-800 text-white hover:bg-slate-700 transition-colors"
          >
            Sign in
          </button>
        </form>
      </div>
    </main>

    <script>
      const p = new URLSearchParams(window.location.search);
      if (p.has("logout")) document.getElementById("msg-logout").classList.remove("hidden");
      if (p.has("error"))  document.getElementById("msg-error").classList.remove("hidden");
    </script>
  </body>
</html>
