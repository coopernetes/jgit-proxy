plugins {
    id 'java'
    id 'org.springframework.boot' version '3.4.2'
    id 'io.spring.dependency-management' version '1.1.6'
    id 'com.diffplug.spotless' version '6.25.0'
    id 'org.cyclonedx.bom' version '1.10.0'
    id 'maven-publish'
}

group = 'com.github.coopernetes'
version = '0.0.1-SNAPSHOT'

java {
    sourceCompatibility = JavaVersion.VERSION_17
    targetCompatibility = JavaVersion.VERSION_17
    toolchain {
        languageVersion = JavaLanguageVersion.of(17)
        vendor = JvmVendorSpec.ADOPTIUM
    }
}

configurations {
    compileOnly {
        extendsFrom annotationProcessor
    }
}

repositories {
    mavenCentral()
    maven {
        url 'https://repo.eclipse.org/content/groups/releases/'
    }
}

ext {
    jgitVersion = '7.0.0.202409031743-r'
    apacheHttpVersion = '4.5.13'
    httpProxyServletVersion = '2.0'
    palantirJavaFormatVersion = '2.51.0'
}

dependencies {
    implementation "org.springframework.boot:spring-boot-starter-actuator"
    implementation "org.springframework.boot:spring-boot-starter-data-mongodb"
    implementation "org.springframework.boot:spring-boot-starter-web"
    implementation "org.eclipse.jgit:org.eclipse.jgit:${jgitVersion}"
    implementation "org.eclipse.jgit:org.eclipse.jgit.http.apache:${jgitVersion}"
    implementation "org.eclipse.jgit:org.eclipse.jgit.http.server:${jgitVersion}"
    implementation "org.apache.httpcomponents:httpclient:${apacheHttpVersion}"
    implementation "org.mitre.dsmiley.httpproxy:smiley-http-proxy-servlet:${httpProxyServletVersion}"
    compileOnly 'org.projectlombok:lombok'
    developmentOnly 'org.springframework.boot:spring-boot-devtools'
//TODO: Uncomment once metrics are enabled
//    implementation 'io.micrometer:micrometer-tracing-bridge-brave'
//    runtimeOnly 'io.micrometer:micrometer-registry-otlp'
    annotationProcessor 'org.projectlombok:lombok'
    testImplementation 'org.springframework.boot:spring-boot-starter-test'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
//TODO: Uncomment when testcontainers tests are enabled
//    testImplementation 'org.springframework.boot:spring-boot-testcontainers'
//    testImplementation 'org.testcontainers:junit-jupiter'
//    testImplementation 'org.testcontainers:mongodb'
}

tasks.named('test') {
    useJUnitPlatform()
}

spotless {
    format 'misc', {
        target '*.properties','*.gradle', '*.md', '.gitignore'
    }
    java {
        palantirJavaFormat("${palantirJavaFormatVersion}").formatJavadoc(true)
    }
}

//compileJava.dependsOn 'spotlessApply'

publishing {
    publications {
        mavenJava(MavenPublication) {
            from(components.java)
        }
    }
}