# jgit-proxy configuration for Docker Compose.
# This file is mounted into the container at /app/conf/git-proxy-local.yml
# and overrides the defaults in git-proxy.yml.

# API key for the REST approval endpoints (X-Api-Key header).
# Set GITPROXY_API_KEY=<strong-secret> in your environment or docker-compose env section.
# Default (dev only): change-me-in-production
# See: https://github.com/coopernetes/jgit-proxy/issues/57

users:
  - username: admin
    password-hash: "{noop}admin"
    emails:
      - admin@example.com

# Repo permissions for local Docker Compose testing.
# admin can push and approve on the Gitea test repos.
permissions:
  - username: admin
    provider: gitea
    path: /test-owner/test-repo
    operations: ALL
  - username: admin
    provider: gitea
    path: /otherorg/*
    path-type: GLOB
    operations: ALL

providers:
  # Disable the default cloud providers; we only need the local Gitea instance.
  github:
    enabled: false
  gitlab:
    enabled: false
  bitbucket:
    enabled: false

  # Local Gitea instance.
  # Push (store-and-forward):  http://localhost:8080/push/gitea/<owner>/<repo>.git
  # Proxy (transparent):       http://localhost:8080/proxy/gitea/<owner>/<repo>.git
  gitea:
    enabled: true
    uri: http://gitea:3000
