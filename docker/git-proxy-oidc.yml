# jgit-proxy OIDC auth configuration.
# Loaded when GITPROXY_CONFIG_PROFILES includes "oidc" (after "docker-default").
#
# Uses navikt/mock-oauth2-server: accepts any username (no password required at the login form).
#
# ── One-time /etc/hosts setup ─────────────────────────────────────────────────
# mock-oauth2-server derives its issuer URL from the incoming request's Host header.
# For the issuer to be consistent between jgit-proxy (Docker DNS) and your browser
# (host network), both must use the same hostname.  Add to /etc/hosts:
#
#   127.0.0.1  mock-oauth2
#
# Linux/Mac: /etc/hosts   Windows: C:\Windows\System32\drivers\etc\hosts
# ──────────────────────────────────────────────────────────────────────────────

auth:
  provider: oidc
  oidc:
    issuer-uri: http://mock-oauth2:9090/default
    client-id: gitproxy-client
    client-secret: gitproxy-secret
    # No jwk-set-uri needed: mock-oauth2-server mirrors the request hostname in its
    # discovery document so the issuer Spring Security sees matches the iss claim.

# OIDC users do not need to be pre-seeded; /api/me returns the authenticated username
# even if the user has no DB record yet.  Add entries here only if you need a user to
# have pre-configured SCM identities before their first login.
