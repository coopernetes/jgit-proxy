# jgit-proxy config for Docker Compose with PostgreSQL backend.
# Mount at /app/conf/git-proxy-local.yml instead of git-proxy-local.yml.
#
# Start with:
#   docker compose --profile postgres \
#     -e 'volumes.jgit-proxy.volumes[0]=./docker/git-proxy-postgres.yml:/app/conf/git-proxy-local.yml:ro' \
#     up
#
# Or override the volume in docker-compose.override.yml.

database:
  type: postgres
  host: postgres
  port: 5432
  name: gitproxy
  username: gitproxy
  password: gitproxy

users:
  - username: admin
    password-hash: "{noop}admin"
    emails:
      - admin@example.com

providers:
  github:
    enabled: false
  gitlab:
    enabled: false
  bitbucket:
    enabled: false
  gitea:
    enabled: true
    uri: http://gitea:3000
