# jgit-proxy config for Docker Compose with MongoDB backend.
# Mount at /app/conf/git-proxy-local.yml instead of git-proxy-local.yml.

database:
  type: mongo
  url: mongodb://gitproxy:gitproxy@mongo:27017
  name: gitproxy

users:
  - username: admin
    password-hash: "{noop}admin"
    emails:
      - admin@example.com

providers:
  github:
    enabled: false
  gitlab:
    enabled: false
  bitbucket:
    enabled: false
  gitea:
    enabled: true
    uri: http://gitea:3000
