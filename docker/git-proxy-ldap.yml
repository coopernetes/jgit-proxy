# git-proxy-java LDAP auth configuration.
# Loaded when GITPROXY_CONFIG_PROFILES includes "ldap" (after "docker-default").
#
# Credentials: testuser / testpass123  (authenticated by OpenLDAP)
#              admin    / admin         (authenticated by OpenLDAP)
#
# The password-hash field is ignored when auth.provider=ldap; it is a placeholder so the user
# record is seeded into the DB (required for /api/me to return profile data).
#
# testuser's scm-identity (gitea scm-identity test-user) closes the identity chain:
#   git push credentials (test-user:<token>) → Gitea API → "test-user"
#   → scm_identities lookup → proxy user "testuser" → PUSH permission check

auth:
  provider: ldap
  ldap:
    url: ldap://openldap:389/dc=example,dc=com
    user-dn-patterns: cn={0},ou=users
    bind-dn: cn=admin,dc=example,dc=com
    bind-password: adminpassword
    group-search-base: ou=groups
  role-mappings:
    ADMIN:
      - git_proxy_admins

users:
  - username: testuser
    password-hash: "{noop}unused"
    emails:
      - testuser@example.com
    scm-identities:
      - provider: gitea
        username: test-user
  - username: admin
    password-hash: "{noop}unused"
    emails:
      - admin@example.com
    roles: [ADMIN]

# Repo permissions are defined in git-proxy-docker-default.yml.
# Defining permissions here would override docker-default entries by list index (Gestalt
# list-merge behaviour), causing user2/user3 grants to disappear. All gitea permissions
# must live in a single config file to avoid this.
