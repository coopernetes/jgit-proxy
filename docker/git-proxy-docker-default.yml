# Five users covering all proxy permission scenarios and admin/reviewer roles.
# gitea-setup.sh creates the corresponding Gitea-side accounts and tokens.
#
# Identity chain (store-and-forward):
#   git push credentials (me:<gitea-token>) → Gitea API → gitea username
#   → scm_identities lookup → proxy username → permission check
#
# Permission scenarios exercised by smoke tests:
#   test-user → LITERAL  /test-owner/test-repo  (push-permission-literal.sh)
#   user2     → GLOB     /otherorg/*             (push-permission-glob.sh)
#   user3     → REGEX    /test-owner/test-repo.* (push-permission-regex.sh)
users:
  - username: admin
    password-hash: "{noop}admin"
    roles: [ADMIN]
    emails:
      - admin@example.com

  - username: test-user
    password-hash: "{noop}Test1234!"
    emails:
      - testuser@example.com
    scm-identities:
      - provider: gitea
        username: test-user

  - username: user2
    password-hash: "{noop}Test1234!"
    emails:
      - user2@example.com
    scm-identities:
      - provider: gitea
        username: user2

  - username: user3
    password-hash: "{noop}Test1234!"
    emails:
      - user3@example.com
    scm-identities:
      - provider: gitea
        username: user3

  - username: reviewer
    password-hash: "{noop}password"

# Repo permissions for the default Docker Compose stack.
permissions:
  # test-user: LITERAL — only /test-owner/test-repo
  - username: test-user
    provider: gitea
    path: /test-owner/test-repo
    operations: PUSH

  # user2: GLOB — any repo under otherorg
  - username: user2
    provider: gitea
    path: /otherorg/*
    path-type: GLOB
    operations: PUSH

  # user3: REGEX — test-owner repos matching test-repo.*
  - username: user3
    provider: gitea
    path: /test-owner/test-repo.*
    path-type: REGEX
    operations: PUSH

  # reviewer: APPROVE on all the same paths
  - username: reviewer
    provider: gitea
    path: /test-owner/test-repo
    operations: REVIEW
  - username: reviewer
    provider: gitea
    path: /otherorg/*
    path-type: GLOB
    operations: REVIEW

  # LDAP testuser (maps to gitea/test-user): same literal grant as test-user above.
  # When docker-default,ldap profiles are combined, GITEA_TESTUSER_TOKEN resolves to
  # "testuser" (the LDAP proxy user). Only LITERAL /test-owner/test-repo is granted
  # so that push-permission-literal.sh still passes the deny-on-other-repo case.
  - username: testuser
    provider: gitea
    path: /test-owner/test-repo
    operations: PUSH

  # admin APPROVE grants for LDAP setup (admin approves via dashboard).
  - username: admin
    provider: gitea
    path: /test-owner/test-repo
    operations: REVIEW
  - username: admin
    provider: gitea
    path: /otherorg/*
    path-type: GLOB
    operations: REVIEW

providers:
  # Local gitea included in docker compose setup
  gitea:
    enabled: true
    uri: http://gitea:3000
  # Disable most public providers by default since they require additional setup (access tokens, etc.) and are not
  # needed for automated testing. Enables github but allow rules only permit fetches from github.com/finos (no push)
  # for demonstration purposes — adjust as needed for your own testing.
  github:
    enabled: true
  gitlab:
    enabled: false
  codeberg:
    enabled: false
  bitbucket:
    enabled: false

commit:
  author:
    email:
      # Domains allowed for commit authors.
      domain:
        allow: "(proton\\.me|gmail\\.com|outlook\\.com|yahoo\\.com|example\\.com)$"
      # Local-parts (before @) that are always blocked regardless of domain.
      local:
        block: "^(noreply|no-reply|bot|nobody)$"
  message:
    block:
      # Commit messages containing any of these strings (case-insensitive) are rejected.
      literals:
        - "WIP"
        - "DO NOT MERGE"
        - "fixup!"
        - "squash!"
      # Commit messages matching any of these patterns are rejected.
      patterns:
        - '(?i)(password|secret|token)\s*[=:]\s*\S+'
  diff:
    block:
      # Example: block internal hostnames/URLs from leaking into public repos.
      literals:
        - "internal.corp.example.com"
      patterns:
        - '(?i)https?://[a-z0-9.-]*\.corp\.example\.com\b'
  # Enables Gitleaks secret scanning. Full configuration reference can be found in the docs:
  #  docs/CONFIGURATION.md#commit-validation
  secret-scan:
    enabled: true

rules:
  allow:
    - enabled: true
      order: 110
      operations:
        - FETCH
        - PUSH
      providers:
        - gitea
      slugs:
        - /test-owner/test-repo
        - /test-owner/test-repo-2
    - enabled: true
      order: 111
      operations:
        - FETCH
        - PUSH
      providers:
        - gitea
      owners:
        - otherorg
    - enabled: true
      order: 120
      operations:
        - FETCH
      providers:
        - github
      owners:
        - finos

  deny:
    # Deny a specific repo inside the otherwise-allowed otherorg/* owner glob.
    # Demonstrates that deny wins: user2 has GLOB permission on /otherorg/* and
    # the allow rule covers all of otherorg, but this repo is explicitly off-limits.
    - enabled: true
      order: 100
      operations:
        - FETCH
        - PUSH
      providers:
        - gitea
      slugs:
        - /otherorg/other-secret

    # Deny repos whose name ends in -readonly or -archived — these are archival
    # copies that should not receive new commits through the proxy.
    - enabled: true
      order: 101
      operations:
        - PUSH
      providers:
        - gitea
      names:
        - "*-readonly"
        - "*-archived"

    # Regex deny: block any repo whose name contains the word "secret" as a
    # distinct segment (e.g. secret-store, my-secret-keys, not "secretariat").
    - enabled: true
      order: 102
      operations:
        - PUSH
      providers:
        - gitea
      names:
        - "regex:(?i)(^|-)secret(-|$).*"
