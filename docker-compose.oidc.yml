# Docker Compose overlay — OIDC authentication profile.
#
# Uses navikt/mock-oauth2-server: a fully OIDC-compliant dev server that accepts any
# username (no password required at the login form).
#
# ── One-time /etc/hosts setup ─────────────────────────────────────────────────
# Add the following line so your browser and git-proxy-java both resolve "mock-oauth2"
# to the same host (required for a consistent OIDC issuer URL):
#
#   127.0.0.1  mock-oauth2
#
# Linux/Mac: /etc/hosts   Windows: C:\Windows\System32\drivers\etc\hosts
# ──────────────────────────────────────────────────────────────────────────────
#
# Start the full stack with OIDC auth:
#   docker compose -f docker-compose.yml -f docker-compose.oidc.yml up -d
#   bash docker/gitea-setup.sh    # (first time only — creates Gitea admin + test repo)
#
# Open http://localhost:8080 — log in with any username (no password).

services:

  mock-oauth2:
    image: ghcr.io/navikt/mock-oauth2-server:3.0.1
    environment:
      # Bind the server to port 9090 (avoids conflict with git-proxy-java on 8080).
      # mock-oauth2-server uses the incoming request's Host header as the issuer base,
      # so accessing it as http://mock-oauth2:9090 produces a consistent issuer URL
      # from both git-proxy-java (Docker DNS) and the browser (/etc/hosts).
      SERVER_PORT: "9090"
      # Pre-configured token callbacks: logging in as "admin" injects a groups claim
      # so that auth.role-mappings can grant ROLE_ADMIN automatically.
      JSON_CONFIG_PATH: /app/mock-oauth2-config.json
    volumes:
      - ./docker/mock-oauth2-config.json:/app/mock-oauth2-config.json:ro
    ports:
      - "9090:9090"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9090/isalive"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  git-proxy-java:
    volumes:
      - ./docker/git-proxy-oidc.yml:/app/conf/git-proxy-oidc.yml:ro
    environment:
      GITPROXY_CONFIG_PROFILES: docker-default,oidc
      GITPROXY_AUTH_OIDC_CLIENT__ID: gitproxy-client
      GITPROXY_AUTH_OIDC_CLIENT__SECRET: gitproxy-secret
    depends_on:
      mock-oauth2:
        condition: service_healthy
