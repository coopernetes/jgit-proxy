name: Container Scan

permissions:
  contents: read

on:
  workflow_call:
    inputs:
      image:
        description: "Image reference to scan (digest preferred)"
        required: true
        type: string
  schedule:
    - cron: '0 6 * * 1' # weekly Monday 06:00 UTC

jobs:
  grype:
    name: Container Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6

      - name: Scan image
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # ratchet:anchore/scan-action@v7
        id: scan
        with:
          image: ${{ inputs.image || 'ghcr.io/coopernetes/git-proxy-java:latest' }}
          fail-build: true
          severity-cutoff: high
          only-fixed: true
          config: .grype.yaml

      # SARIF upload intentionally omitted — OS-layer CVEs from the base image are triaged
      # by internal scanning with application context. Uploading here creates misleading noise
      # in the GitHub Security tab (high CVSS score ≠ high actual risk for this workload).
      # The build still fails on high/critical with a fix available via fail-build: true above.

      - name: Generate human-readable report
        if: always()
        run: |
          grype ${{ inputs.image || 'ghcr.io/coopernetes/git-proxy-java:latest' }} \
            --config .grype.yaml \
            --output table > grype-report.txt || true
          grype ${{ inputs.image || 'ghcr.io/coopernetes/git-proxy-java:latest' }} \
            --config .grype.yaml \
            --output json > grype-report.json || true

      - name: Upload scan reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # ratchet:actions/upload-artifact@v7
        with:
          name: grype-container-scan
          path: |
            grype-report.txt
            grype-report.json
          retention-days: 30
