logging:
  level:
    org.finos.gitproxy: DEBUG

server:
  # Allow the Vite dev server to make cross-origin requests to the backend.
  # Vite defaults to port 5173; adjust if you've changed it.
  allowed-origins:
    - http://localhost:5173

# Dev user for local testing. Use {noop} prefix for plaintext passwords (dev only).
# For production, use {bcrypt} prefix: htpasswd -bnBC 12 "" yourpassword | tr -d ':\n'
# then set password-hash: "{bcrypt}$2a$12$..."
users:
  - username: admin
    password-hash: "{noop}admin"
    emails:
      - developer@example.com
    scm-identities:
      - provider: github
        username: coopernetes
      - provider: gitlab
        username: coopernetes
      # codeberg intentionally omitted — used to test unresolved identity scenario

  - username: dev-full
    password-hash: "{noop}password"
    emails:
      - dev-full@example.com
    push-usernames:
      - dev-full
    scm-identities:
      - provider: github
        username: dev-full-gh

  - username: dev-no-scm
    password-hash: "{noop}password"
    emails:
      - dev-no-scm@example.com
    push-usernames:
      - dev-no-scm

  - username: dev-no-email
    password-hash: "{noop}password"
    push-usernames:
      - dev-no-email
    scm-identities:
      - provider: github
        username: dev-no-email-gh
commit:
  author:
    email:
      # Domains allowed for commit authors.
      # Used by the local test-*.sh scripts — replace with your corporate domain in production.
      domain:
        allow: "(proton\\.me|gmail\\.com|outlook\\.com|yahoo\\.com|example\\.com)$"
      # Local-parts (before @) that are always blocked regardless of domain.
      local:
        block: "^(noreply|no-reply|bot|nobody)$"
  message:
    block:
      # Commit messages containing any of these strings (case-insensitive) are rejected.
      literals:
        - "WIP"
        - "DO NOT MERGE"
        - "fixup!"
        - "squash!"
      # Commit messages matching any of these patterns are rejected.
      patterns:
        - '(?i)(password|secret|token)\s*[=:]\s*\S+'
  diff:
    block:
      # Example: block internal hostnames/URLs from leaking into public repos.
      # This is the intended use case for diff scanning — org-specific patterns.
      # Secret detection should be handled by gitleaks (secret-scanning below).
      literals:
        - "internal.corp.example.com"
      patterns:
        - '(?i)https?://[a-z0-9.-]*\.corp\.example\.com\b'
  secret-scanning:
    enabled: true

filters:
  whitelists:
    - enabled: true
      order: 110
      operations:
        - FETCH
        - PUSH
      providers:
        - github
      slugs:
        - finos/git-proxy
        - coopernetes/test-repo
    - enabled: true
      order: 111
      operations:
        - FETCH
        - PUSH
      providers:
        - gitlab
      slugs:
        - coopernetes/test-repo-gitlab
    - enabled: true
      order: 112
      operations:
        - FETCH
        - PUSH
      providers:
        - codeberg
      slugs:
        - coopernetes/test-repo-codeberg
    - enabled: true
      order: 120
      operations:
        - FETCH
      owners:
        - finos
      providers:
        - github
