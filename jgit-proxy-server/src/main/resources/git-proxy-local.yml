logging:
  level:
    org.finos.gitproxy: DEBUG
database:
  type: h2-file
git-proxy:
  filters:
    whitelists:
      - enabled: true
        order: 1100
        operations:
          - FETCH
          - PUSH
        providers:
          - github
        slugs:
          - finos/git-proxy
          - coopernetes/test-repo
      - enabled: true
        order: 1200
        operations:
          - FETCH
        owners:
          - finos
        providers:
          - github
