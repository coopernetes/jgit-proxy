server:
  port: 8080

# Database configuration for push audit storage.
# Supported types: memory, h2-mem, h2-file, sqlite, postgres, mongo
database:
  type: h2-mem

# The below is a minimal configuration needed for the app to start and is the default shipped with the jar.
# By default, the app supports proxying to GitHub, GitLab, and Bitbucket. Users should override this configuration
# to suit their needs.
git-proxy:
#  base-path: "/git"
  providers:
    github:
      enabled: true
    gitlab:
      enabled: true
    bitbucket:
      enabled: true
#    internal-gitlab:
#      enabled: true
#      servlet-path: /enterprise
#      uri: https://gitlab.internal.example.com
#    debian-gitlab:
#      enabled: true
#      servlet-path: /debian
#      uri: https://salsa.debian.org/

  # Commit validation rules applied by both the store-and-forward and transparent proxy pipelines.
  commit:
    author:
      email:
        # Regex that the email domain must match. Omit (or leave blank) to allow all domains.
        # Example: "(corp\\.example\\.com|contractors\\.example\\.com)$"
        domain:
          allow: ""
        # Regex that blocks matching local-parts (the part before @).
        local:
          block: "^(noreply|no-reply|bot|nobody)$"
    message:
      block:
        literals:
          - "WIP"
          - "DO NOT MERGE"
          - "fixup!"
          - "squash!"
        patterns:
          - '(?i)(password|secret|token)\s*[=:]\s*\S+'
    diff:
      block:
        # Literals and patterns scanned against added lines (+) in the push diff.
        # Add entries here to block secrets, internal hostnames, etc. from being pushed.
        literals: []
        patterns: []
